name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 0.2.0). Leave empty to auto-bump."
        required: false
        type: string
      bump:
        description: "Bump type (ignored if version is set)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — skip publish, don't push tag"
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: hyperb1iss/shared-workflows/.github/workflows/rust-release.yml@main
    with:
      version: ${{ inputs.version }}
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
    permissions:
      contents: write
      actions: write
    secrets: inherit

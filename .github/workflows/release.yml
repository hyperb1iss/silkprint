name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 0.2.0). Leave empty to auto-bump."
        required: false
        type: string
      bump:
        description: "Bump type (ignored if version is set)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — skip publish, don't push tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Determine version
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT"

          if [[ -n "${{ inputs.version }}" ]]; then
            NEW="${{ inputs.version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJOR + 1)).0.0" ;;
              minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
              patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi

          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Update Cargo.toml
        run: |
          sed -i "0,/^version = \".*\"/s//version = \"${{ steps.version.outputs.new }}\"/" Cargo.toml
          cargo update -w

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo nextest run --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Commit & tag
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags

      - name: Summary
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "🧪 Dry run complete — v${{ steps.version.outputs.new }} validated but NOT published"
          else
            echo "🚀 Tagged v${{ steps.version.outputs.new }} — CI/CD will handle crates.io + GitHub Release"
          fi

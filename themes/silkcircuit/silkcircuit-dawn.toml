# ═══════════════════════════════════════════════════════════════
# SilkPrint Theme — SilkCircuit Dawn
# Light variant — electric blue & magenta on warm cream
# ═══════════════════════════════════════════════════════════════

[meta]
name        = "SilkCircuit Dawn"
version     = "2"
variant     = "light"
description = "Electric blue & magenta on warm cream — the default"
print_safe  = true
extends     = ""

# ─── Layer 1: Primitives ──────────────────────────────────────

[colors]
white          = "#ffffff"
background     = "#fdf9ee"
surface        = "#f5ecd9"
surface_alt    = "#ebe0c6"
border_light   = "#e2d6b6"
border_strong  = "#bfae84"
text_primary   = "#1d1a2e"
text_secondary = "#463e5c"
text_muted     = "#6a5f7e"
accent_blue    = "#0a5fd1"
accent_purple  = "#6d1caa"
accent_magenta = "#b31e7f"
accent_teal    = "#00665e"
accent_green   = "#1f6a36"
accent_amber   = "#7a5400"
accent_red     = "#ab1d28"

[fonts]
heading          = "Inter"
heading_weight   = 600
heading_italic   = false
body             = "Inter"
body_weight      = 400
body_italic      = false
mono             = "JetBrains Mono"
mono_weight      = 400
mono_ligatures   = false
heading_fallback = ["Inter", "Helvetica Neue", "Arial"]
body_fallback    = ["Inter", "Helvetica Neue", "Arial"]
mono_fallback    = ["JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code"]

[font_sizes]
body   = "10pt"
small  = "8pt"
code   = "9pt"
h1     = "22pt"
h2     = "15pt"
h3     = "12pt"
h4     = "10.5pt"
h5     = "9.5pt"
h6     = "9pt"

# ─── Layer 2: Semantic ────────────────────────────────────────

[page]
background     = "background"
margin_top     = "26mm"
margin_bottom  = "30mm"
margin_left    = "22mm"
margin_right   = "22mm"
paper          = "a4"
columns        = 1
column_gap     = "12mm"

[text]
color           = "text_primary"
line_height     = 1.45
paragraph_gap   = "0.75em"
justification   = "left"
spacing_mode    = "gap"
first_line_indent = "0pt"
orphan_lines    = 2
widow_lines     = 2

[headings]
color          = "accent_blue"
font           = "heading"
line_height    = 1.2
letter_spacing = "-0.015em"

[headings.h1]
color            = "accent_magenta"
weight           = 700
line_height      = 1.1
border           = true
above            = "22pt"
below            = "12pt"
page_break_before = false

[headings.h2]
weight           = 600
line_height      = 1.15
border           = true
above            = "20pt"
below            = "9pt"
page_break_before = false

[headings.h3]
weight         = 600
line_height    = 1.2
above          = "16pt"
below          = "6pt"

[headings.h4]
weight         = 500
line_height    = 1.2
above          = "14pt"
below          = "5pt"

[headings.h5]
weight         = 500
line_height    = 1.25
above          = "12pt"
below          = "4pt"

[headings.h6]
color          = "accent_magenta"
weight         = 600
line_height    = 1.25
above          = "10pt"
below          = "4pt"
uppercase      = true
letter_spacing = "0.08em"

[code_block]
background        = "surface"
border_color      = "border_light"
border_radius     = "5pt"
padding_vertical  = "12pt"
padding_horizontal = "14pt"
line_height       = 1.5
left_accent       = true
left_accent_color = "accent_magenta"
line_numbers      = false
language_label    = true
language_label_color = "accent_magenta"
language_label_size  = "7.5pt"
wrap              = true

[code_inline]
background     = "surface"
border_color   = "border_light"
border_radius  = "3pt"

[blockquote]
border_color      = "accent_magenta"
border_width      = "3pt"
background        = "surface"
background_opacity = 0.45
text_color        = "text_secondary"
italic            = true
left_padding      = "16pt"

[table]
header_background   = "accent_blue"
header_text_color   = "white"
header_border_color = "accent_blue"
header_border_width = "1.5pt"
header_font         = "heading"
header_weight       = 600
row_border_color    = "border_light"
row_border_width    = "0.5pt"
stripe_background   = "surface"
vertical_lines      = false
font_size           = "8pt"
cell_padding        = "6pt 9pt"

[horizontal_rule]
color     = "accent_magenta"
width     = "100%"
thickness = "0.75pt"
style     = "line"

[links]
color     = "accent_blue"
underline = true

[images]
max_width        = "100%"
alignment        = "center"
border           = false
border_radius    = "4pt"
caption_font     = "body"
caption_size     = "small"
caption_color    = "text_muted"
caption_italic   = true
caption_position = "below"

[list]
bullet_color       = "text_secondary"
indent             = "20pt"
nested_indent      = "20pt"
task_checked_color = "accent_green"
task_unchecked_color = "text_muted"

[footnotes]
separator_color   = "border_light"
separator_width   = "33%"
text_size         = "small"
number_color      = "accent_blue"
backref_color     = "accent_blue"

[alerts]
note_color          = "accent_blue"
tip_color           = "accent_green"
important_color     = "accent_magenta"
warning_color       = "accent_amber"
caution_color       = "accent_red"
border_width        = "3pt"
background_opacity  = 0.1
show_icon           = true
show_label          = true

[toc]
title             = "Contents"
title_size        = "h2"
entry_color       = "text_primary"
page_number_color = "text_muted"
leader_style      = "dots"
indent            = "1.5em"
max_depth         = 3

[page_numbers]
enabled    = true
position   = "bottom-center"
format     = "1"
font       = "body"
size       = "small"
color      = "text_muted"
first_page = false

[title_page]
enabled          = true
title_font       = "heading"
title_size       = "36pt"
title_color      = "accent_magenta"
subtitle_color   = "text_secondary"
author_color     = "text_secondary"
date_color       = "text_muted"
separator_color  = "accent_blue"

[emphasis]
strikethrough_color = "text_muted"

[math]
color = "text_primary"

[highlight]
fill         = "accent_amber"
fill_opacity = 0.25
text_color   = ""
border_radius = "2pt"

[description_list]
term_font       = "heading"
term_weight     = 600
term_color      = "accent_magenta"
definition_indent = "20pt"
term_spacing    = "4pt"
item_spacing    = "12pt"

# ─── Syntax Highlighting ──────────────────────────────────────

[syntax]
background = "surface"

[syntax.text]
color = "text_primary"

[syntax.keyword]
color  = "accent_blue"
bold   = true

[syntax.string]
color  = "accent_magenta"
italic = true

[syntax.number]
color = "accent_amber"

[syntax.function]
color  = "accent_teal"
bold   = true

[syntax.type]
color = "accent_purple"

[syntax.comment]
color  = "text_muted"
italic = true

[syntax.constant]
color = "accent_magenta"

[syntax.boolean]
color = "accent_blue"
bold  = true

[syntax.operator]
color = "text_primary"

[syntax.property]
color = "accent_teal"

[syntax.tag]
color = "accent_blue"
bold  = true

[syntax.attribute]
color = "accent_amber"

[syntax.variable]
color = "accent_purple"

[syntax.builtin]
color  = "accent_teal"
bold   = true

[syntax.punctuation]
color = "text_muted"

[syntax.escape]
color = "accent_amber"
bold  = true
